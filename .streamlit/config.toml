# ────────────────────────────────────────────────────────────────
# Automated IT Newsroom - Streamlit 테마 및 동작 설정 파일 (config.toml)
# ────────────────────────────────────────────────────────────────
# 이 파일은 애플리케이션의 디자인 레이아웃 및 성능 설정을 담당합니다.
# 프리미엄 테크 브리핑 서비스에 어울리는 고급스럽고 차분한 다크 모드 테마를 기본 적용합니다.

[theme]
# 주 강조 색상 (버튼, 링크, 액티브 요소 등) - 신뢰감을 주는 차분한 인디고 퍼플 계열
primaryColor = "#6C5CE7"

# 메인 콘텐츠 영역 배경색 - 깔끔하고 눈이 편안한 딥 네이비 다크그레이
backgroundColor = "#0E1117"

# 사이드바 및 카드 배경색 - 입체감을 주는 연한 다크그레이
secondaryBackgroundColor = "#1A1F2C"

# 텍스트 색상 - 가독성이 높은 화이트에 가까운 소프트 그레이
textColor = "#E2E8F0"

# 폰트 스타일 설정 (기본 sans serif)
font = "sans serif"

[server]
# 브라우저 실행 시 자동으로 새 탭을 여는 동작 여부 (로컬 개발용)
headless = true
enableCORS = false
enableXsrfProtection = false
